<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0A0907" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Tara</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // V13.4.18 design pass — refined palette. Overrides Tailwind's stock
      // emerald/rose/amber scales at the shades Tara actually uses, so every
      // existing `text-emerald-400`, `bg-rose-500/10`, etc. class across the
      // app repaints without touching component code. Same semantic roles
      // (emerald=win/UP, rose=loss/DOWN, amber=warm/caution) — just warmer,
      // more muted exact values in place of Tailwind's stock saturated ones.
      // V13.4.19: also point font-sans/font-mono at real webfonts (loaded
      // above) instead of Tailwind's system-font stack — repaints all 72
      // existing `font-mono` and 4 `font-sans` classes across the app the
      // same way the palette override repaints colors. Base body font is
      // set separately below so untagged text picks it up too.
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              emerald: {
                200: '#C4D4C7',
                300: '#A3BCA8',
                400: '#7FA189',
                500: '#688C72',
                600: '#54735D',
                700: '#435C4A',
                900: '#233022',
              },
              rose: {
                200: '#DDBDB6',
                300: '#C4938A',
                400: '#B26558',
                500: '#9A5145',
                600: '#7D4038',
              },
              amber: {
                300: '#E0B978',
                400: '#D4A24C',
                500: '#BD8A38',
              },
              // V13.4.28: indigo was missed in the original palette override —
              // 135 usages across buttons, focus rings, and icons were still
              // rendering Tailwind's stock, fully-saturated indigo, clashing
              // hard against the muted warm palette everywhere else. Muted to
              // a neutral slate-blue for utility/focus states.
              indigo: {
                100: '#DDE1E7',
                300: '#AEB8C4',
                400: '#8C98A8',
                500: '#6E7A8C',
              },
            },
            fontFamily: {
              sans: ['"Instrument Sans"', 'ui-sans-serif', 'system-ui', 'sans-serif'],
              mono: ['"IBM Plex Mono"', 'ui-monospace', 'monospace'],
            },
          },
        },
      };
    </script>
    <style>
      /* V13.4.19: base font for any text that isn't explicitly tagged with a
         Tailwind font-sans/font-mono class — same webfont, applies globally
         with zero component changes. */
      html, body {
        font-family: 'Instrument Sans', ui-sans-serif, system-ui, sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
